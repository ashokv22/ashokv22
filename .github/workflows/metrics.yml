name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}] # Runs every day at midnight
  workflow_dispatch: # Allows you to run it manually
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ashokv22
          template: classic
          base: header, repositories, metadata
          config_timezone: Asia/Kolkata

          plugin_languages: yes
          plugin_languages_ignored: html, css # Focus on your core logic langs

          plugin_lines: yes # Shows total lines of code added/deleted
          plugin_contributions: yes
          plugin_contributions_sections: total, calendar
